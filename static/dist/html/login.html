<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion – SYBEM Academia</title>
  <link rel="stylesheet" href="/static/dist/css/output.css" />
</head>

<body class="h-screen overflow-hidden bg-bg-base dark:bg-bg-dark flex items-center justify-center text-gray-900 dark:text-gray-100 px-4">

  <div class="w-full max-w-md bg-white dark:bg-gray-800 p-8 rounded-xl shadow-2xl border border-gray-200 dark:border-gray-700">

    <div class="flex flex-col items-center mb-8">
      <img src="/static/src/img/Transpa-Logo.PNG" alt="Logo Sybem" class="h-16 w-auto mb-3">
      <h2 class="text-3xl font-extrabold text-center text-primary">SYBEM Academia</h2>
      <p class="mt-2 text-sm text-gray-600 dark:text-gray-400">Connectez-vous à votre plateforme</p>
    </div>

    <div id="message-box" class="hidden mb-4 p-3 text-sm rounded-lg transition-all duration-300"></div>

    <form id="login-form" class="space-y-6">
      <div>
        <label class="block text-sm font-medium mb-1">Email</label>
        <input id="email" type="email" required autocomplete="email"
               class="w-full px-4 py-2 rounded-lg border bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 focus:ring-2 focus:ring-primary outline-none">
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Mot de passe</label>
        <input id="password" type="password" required autocomplete="current-password"
               class="w-full px-4 py-2 rounded-lg border bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 focus:ring-2 focus:ring-primary outline-none">
      </div>

      <div class="text-right">
        <button type="button" id="btn-show-reset" class="text-sm text-primary hover:underline font-medium">
          Mot de passe oublié ?
        </button>
      </div>

      <button type="submit" id="login-submit" class="w-full py-2.5 rounded-lg bg-primary text-white font-bold hover:bg-secondary transition-all transform active:scale-95 shadow-md">
        Se connecter
      </button>
    </form>

    <form id="reset-form" class="hidden space-y-6 mt-6">
      <div>
        <label class="block text-sm font-medium mb-1">Adresse email de récupération</label>
        <input id="reset-email" type="email" required
               class="w-full px-4 py-2 rounded-lg border bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 focus:ring-2 focus:ring-primary outline-none">
      </div>

      <button type="submit" id="reset-submit" class="w-full py-2.5 rounded-lg bg-primary text-white font-bold hover:bg-secondary transition">
        Envoyer le lien
      </button>

      <p id="btn-show-login" class="text-sm text-center text-gray-500 cursor-pointer hover:underline font-medium mt-4">
        ← Retour à la connexion
      </p>
    </form>
  </div>

  <script src="/static/dist/js/auth.js"></script>
</body>
</html>
