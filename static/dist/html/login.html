<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion – SYBEM Academia</title>

  <!-- Tailwind build -->
  <link rel="stylesheet" href="/static/dist/css/output.css" />

  <!-- Dark mode -->
  
</head>

<body class="h-screen overflow-hidden bg-bg-base dark:bg-bg-dark
             flex items-center justify-center
             text-gray-900 dark:text-gray-100 px-4">

  <div class="w-full max-w-md bg-white dark:bg-gray-800
              p-8 rounded-xl shadow-2xl
              border border-gray-200 dark:border-gray-700">

    <!-- HEADER -->
    <div class="flex flex-col items-center mb-8">                   <img src="/static/src/img/Transpa-Logo.PNG" alt="Logo Sybem" class="h-16 w-auto mb-3">

      <h2 class="text-3xl font-extrabold">SYBEM Academia</h2>

      <p class="mt-2 text-sm text-gray-600 dark:text-gray-400">
        Connectez-vous à votre plateforme
      </p>
    </div>

    <!-- ERROR -->
    <div id="error"
         class="hidden mb-4 p-3 text-sm rounded-lg
                bg-red-100 text-red-700
                dark:bg-red-900 dark:text-red-300">
      Identifiants incorrects
    </div>

    <!-- LOGIN FORM -->
    <form id="login-form" class="space-y-6" onsubmit="login(event)">
      <div>
        <label class="block text-sm font-medium">Email</label>
        <input id="email" type="email" required
               class="mt-1 w-full px-4 py-2 rounded-lg border
                      bg-white dark:bg-gray-700
                      border-gray-300 dark:border-gray-600">
      </div>

      <div>
        <label class="block text-sm font-medium">Mot de passe</label>
        <input id="password" type="password" required
               class="mt-1 w-full px-4 py-2 rounded-lg border
                      bg-white dark:bg-gray-700
                      border-gray-300 dark:border-gray-600">
      </div>

      <div class="text-right">
        <button type="button"
                onclick="showResetForm()"
                class="text-sm text-primary hover:underline">
          Mot de passe oublié ?
        </button>
      </div>

      <button class="w-full py-2 rounded-lg
                     bg-primary text-white
                     hover:bg-secondary transition">
        Se connecter
      </button>
    </form>

    <!-- RESET FORM -->
    <form id="reset-form" class="hidden space-y-6 mt-6"
          onsubmit="requestPasswordReset(event)">

      <div>
        <label class="block text-sm font-medium">Adresse email</label>
        <input id="reset-email" type="email" required
               class="mt-1 w-full px-4 py-2 rounded-lg border
                      bg-white dark:bg-gray-700
                      border-gray-300 dark:border-gray-600">
      </div>

      <button class="w-full py-2 rounded-lg
                     bg-primary text-white
                     hover:bg-secondary transition">
        Envoyer le lien
      </button>

      <p onclick="showLoginForm()"
         class="text-sm text-center text-gray-500
                cursor-pointer hover:underline">
        ← Retour à la connexion
      </p>
    </form>

  </div>

  <script src="/static/dist/js/auth.js"></script>

</body>
</html>
