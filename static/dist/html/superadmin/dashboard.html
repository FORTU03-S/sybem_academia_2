 <!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8 " />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
  if (localStorage.getItem("theme") === "dark") {
    document.documentElement.classList.add("dark");
  }
</script>

  <title>Super Admin • SYBEM</title>
  
  <!-- OPTION 1: CDN Tailwind COMPLET (garanti) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Configuration Tailwind pour le dark mode
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#4f46e5',
            secondary: '#7c3aed',
            bg: {
              base: '#f9fafb',
              dark: '#1f2937'
            },
            border: {
              'blue-dark': '#1e3a8a',
              'blue-light': '#93c5fd'
            }
          }
        }
      }
    }
  </script>
  
  <!-- OPTION 2: Fallback si le CDN échoue -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* STYLES DE FALLBACK ABSOLUS */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      background-color: #f8fafc;
      color: #1e293b;
    }
    
    /* Sidebar */
    #sidebar {
      width: 260px;
      background: white;
      border-right: 1px solid #e2e8f0;
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      display: flex;
      flex-direction: column;
    }
    
    .dark #sidebar {
      background: #1e293b;
      border-color: #334155;
    }
    
    /* Topbar */
    #topbar {
      height: 64px;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      position: fixed;
      top: 0;
      left: 260px;
      right: 0;
      z-index: 10;
    }
    
    .dark #topbar {
      background: #1e293b;
      border-color: #334155;
      color: #f1f5f9;
    }
    
    /* Contenu principal */
    #main-content {
      flex: 1;
      margin-left: 260px;
      margin-top: 64px;
      padding: 24px;
    }
    
    /* Grille des cartes */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      margin-top: 20px;
    }
    
    /* Carte de statistique */
    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      border: 2px solid #e0e7ff;
      box-shadow: 0 4px 6px rgba(37, 99, 235, 0.1);
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      position: relative;
      overflow: hidden;
    }
    
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
    }
    
    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 25px rgba(37, 99, 235, 0.15);
      border-color: #93c5fd;
    }
    
    .dark .stat-card {
      background: #1e293b;
      border-color: #374151;
      border: 2px solid #1e3a8a;
    }
    
    .dark .stat-card:hover {
      border-color: #3b82f6;
      box-shadow: 0 10px 25px rgba(59, 130, 246, 0.2);
    }
    
    .stat-card h2 {
      font-size: 32px;
      font-weight: 700;
      margin: 8px 0 0 0;
      color: #1e293b;
    }
    
    .dark .stat-card h2 {
      color: #f1f5f9;
    }
    
    .stat-card p {
      font-size: 14px;
      color: #64748b;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 500;
    }
    
    .dark .stat-card p {
      color: #94a3b8;
    }
    
    /* Navigation */
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      color: #475569;
      text-decoration: none;
      border-radius: 8px;
      margin: 4px 12px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      border-left: 3px solid transparent;
    }
    
    .nav-item:hover {
      background: #f1f5f9;
      border-left-color: #3b82f6;
      transform: translateX(4px);
    }
    
    .nav-item::before {
      content: '';
      position: absolute;
      left: -100%;
      top: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.1), transparent);
      transition: left 0.5s ease;
    }
    
    .nav-item:hover::before {
      left: 100%;
    }
    
    .dark .nav-item {
      color: #cbd5e1;
      border-left-color: transparent;
    }
    
    .dark .nav-item:hover {
      background: #334155;
      border-left-color: #60a5fa;
    }
    
    .nav-item.active {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: white;
      border-left-color: #ffffff;
      box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
      animation: pulse 2s infinite;
    }
    
    .dark .nav-item.active {
      background: linear-gradient(135deg, #3730a3 0%, #5b21b6 100%);
      border-left-color: #93c5fd;
    }
    
    /* Boutons */
    .btn-logout {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      border: 2px solid #fca5a5;
    }
    
    .btn-logout:hover {
      background: linear-gradient(135deg, #b91c1c 0%, #991b1b 100%);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(220, 38, 38, 0.3);
      border-color: #f87171;
    }
    
    .btn-logout::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 5px;
      height: 5px;
      background: rgba(255, 255, 255, 0.5);
      opacity: 0;
      border-radius: 100%;
      transform: scale(1, 1) translate(-50%);
      transform-origin: 50% 50%;
    }
    
    .btn-logout:active::after {
      animation: ripple 1s ease-out;
    }
    
    .btn-theme {
      padding: 8px;
      border-radius: 8px;
      background: transparent;
      border: 2px solid #d1d5db;
      cursor: pointer;
      color: #64748b;
      transition: all 0.2s;
    }
    
    .btn-theme:hover {
      background: #f1f5f9;
      border-color: #3b82f6;
      color: #3b82f6;
    }
    
    .dark .btn-theme {
      border-color: #4b5563;
      color: #9ca3af;
    }
    
    .dark .btn-theme:hover {
      background: #334155;
      border-color: #60a5fa;
      color: #60a5fa;
    }
    
    /* Avatar */
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid #3b82f6;
      object-fit: cover;
      box-shadow: 0 2px 4px rgba(59, 130, 246, 0.2);
    }
    
    .dark .avatar {
      border-color: #60a5fa;
      box-shadow: 0 2px 4px rgba(96, 165, 250, 0.3);
    }

    /* Animation pour l'élément actif */
    @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.4); }
        70% { box-shadow: 0 0 0 10px rgba(79, 70, 229, 0); }
        100% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0); }
    }

    /* Animation d'apparition des cartes */
    .stat-card {
        opacity: 0;
        transform: translateY(20px);
        animation: fadeInUp 0.6s ease forwards;
    }

    .stat-card:nth-child(1) { animation-delay: 0.1s; }
    .stat-card:nth-child(2) { animation-delay: 0.2s; }
    .stat-card:nth-child(3) { animation-delay: 0.3s; }

    @keyframes fadeInUp {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Animation des chiffres */
    .stat-card h2 {
        transition: all 0.3s ease;
    }

    .stat-card:hover h2 {
        color: #3b82f6;
        transform: scale(1.05);
    }

    .dark .stat-card:hover h2 {
        color: #93c5fd;
    }

    @keyframes ripple {
        0% {
            transform: scale(0, 0);
            opacity: 0.5;
        }
        100% {
            transform: scale(40, 40);
            opacity: 0;
        }
    }

    /* Animation de chargement des données */
    .loading {
        position: relative;
        background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
        background-size: 200% 100%;
        animation: loading 1.5s infinite;
    }

    @keyframes loading {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
    }

    /* Styles pour les boutons d'actions rapides */
    .quick-action-btn {
        position: relative;
        overflow: hidden;
        transition: all 0.3s ease;
        border: 2px solid;
    }
    
    .quick-action-btn::after {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
        transition: left 0.7s ease;
    }
    
    .quick-action-btn:hover::after {
        left: 100%;
    }
    
    .quick-action-card {
        border: 2px solid #dbeafe;
        background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
        position: relative;
        overflow: hidden;
    }
    
    .dark .quick-action-card {
        border: 2px solid #1e3a8a;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    }
    
    .quick-action-card::before {
        content: '';
        position: absolute;
        top: -2px;
        left: -2px;
        right: -2px;
        bottom: -2px;
        background: linear-gradient(45deg, #3b82f6, #8b5cf6, #3b82f6);
        z-index: -1;
        border-radius: 14px;
        opacity: 0;
        transition: opacity 0.3s ease;
    }
    
    .quick-action-card:hover::before {
        opacity: 1;
    }
    
    /* Effet de brillance sur les boutons */
    .btn-shine {
        position: relative;
        overflow: hidden;
    }
    
    .btn-shine::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -60%;
        width: 20%;
        height: 200%;
        background: rgba(255, 255, 255, 0.3);
        transform: rotate(30deg);
        transition: left 0.7s ease;
    }
    
    .btn-shine:hover::before {
        left: 140%;
    }

  </style>
</head>

<body class="bg-gradient-to-br from-blue-50 to-indigo-50 dark:from-gray-900 dark:to-gray-950 text-gray-900 dark:text-gray-100">

<!-- SIDEBAR -->
<div id="sidebar"></div>
<div id="topbar"></div>

<!-- CONTENU PRINCIPAL -->
<main id="main-content">
  <!-- Titre section -->
  <div class="mb-8">
    <h2 class="text-2xl font-bold mb-2 bg-gradient-to-r from-blue-700 to-indigo-700 dark:from-blue-400 dark:to-indigo-400 bg-clip-text text-transparent">Aperçu général</h2>
    <p class="text-gray-600 dark:text-gray-400">Statistiques de votre plateforme</p>
  </div>

  <!-- Cartes de statistiques -->
  <div class="cards-grid">
    <div class="stat-card">
      <p>Écoles</p>
      <h2 id="total-schools">--</h2>
    </div>

    <div class="stat-card">
      <p>Utilisateurs</p>
      <h2 id="total-users">--</h2>
    </div>

    <div class="stat-card">
      <p>Abonnements actifs</p>
      <h2 id="active-plans">--</h2>
    </div>
  </div>

  <!-- SECTION ACTIONS RAPIDES AVEC CONTOUR BLEU FONCÉ -->
  <div class="mt-8 p-6 quick-action-card rounded-xl shadow-lg">
    <h3 class="text-lg font-semibold mb-4 text-blue-800 dark:text-blue-300">🚀 Actions rapides</h3>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <button id="createSchoolBtn" 
              class="flex items-center justify-center gap-2 p-4 bg-white dark:bg-gray-800 text-blue-700 dark:text-blue-400 rounded-lg border-2 border-blue-300 dark:border-blue-700 hover:bg-blue-50 dark:hover:bg-blue-900/30 hover:border-blue-500 dark:hover:border-blue-500 transition-all duration-300 hover:scale-105 btn-shine quick-action-btn">
        <i data-lucide="plus-circle" class="w-5 h-5"></i>
        Nouvelle école
      </button>
      
      <button id="manageSchoolsBtn" 
              class="flex items-center justify-center gap-2 p-4 bg-white dark:bg-gray-800 text-green-700 dark:text-green-400 rounded-lg border-2 border-green-300 dark:border-green-700 hover:bg-green-50 dark:hover:bg-green-900/30 hover:border-green-500 dark:hover:border-green-500 transition-all duration-300 hover:scale-105 btn-shine quick-action-btn">
        <i data-lucide="school" class="w-5 h-5"></i>
        Gérer les écoles
      </button>
      
      <button id="createPlanBtn" 
              class="flex items-center justify-center gap-2 p-4 bg-white dark:bg-gray-800 text-purple-700 dark:text-purple-400 rounded-lg border-2 border-purple-300 dark:border-purple-700 hover:bg-purple-50 dark:hover:bg-purple-900/30 hover:border-purple-500 dark:hover:border-purple-500 transition-all duration-300 hover:scale-105 btn-shine quick-action-btn">
        <i data-lucide="credit-card" class="w-5 h-5"></i>
        Nouvel abonnement
      </button>
    </div>
    
    <!-- Boutons supplémentaires -->
    <div class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-3">
      <button id="manageUsersBtn" 
              class="flex items-center justify-center gap-2 p-3 bg-gradient-to-r from-blue-500 to-indigo-500 text-white rounded-lg hover:from-blue-600 hover:to-indigo-600 transition-all duration-300 hover:scale-102 btn-shine">
        <i data-lucide="users" class="w-4 h-4"></i>
        Gestion des utilisateurs
      </button>
      
      <button id="manageSubscriptionsBtn" 
              class="flex items-center justify-center gap-2 p-3 bg-gradient-to-r from-purple-500 to-pink-500 text-white rounded-lg hover:from-purple-600 hover:to-pink-600 transition-all duration-300 hover:scale-102 btn-shine">
        <i data-lucide="credit-card" class="w-4 h-4"></i>
        Gestion des abonnements
      </button>
    </div>
  </div>
  
  <!-- Section informations système -->
  <div class="mt-8 p-6 bg-gradient-to-r from-gray-50 to-blue-50 dark:from-gray-800 dark:to-blue-900/20 rounded-xl border-2 border-blue-100 dark:border-blue-800 shadow">
    <h3 class="text-lg font-semibold mb-4 text-blue-800 dark:text-blue-300">ℹ️ Informations système</h3>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="p-3 bg-white/50 dark:bg-gray-800/50 rounded-lg border border-blue-100 dark:border-blue-800">
        <p class="text-sm text-gray-600 dark:text-gray-400">Connecté en tant que</p>
        <p class="font-medium" id="current-user">Super Administrateur</p>
      </div>
      <div class="p-3 bg-white/50 dark:bg-gray-800/50 rounded-lg border border-blue-100 dark:border-blue-800">
        <p class="text-sm text-gray-600 dark:text-gray-400">Dernière mise à jour</p>
        <p class="font-medium" id="last-update">--:--</p>
      </div>
    </div>
  </div>
</main>

<!-- Scripts -->
<script src="https://unpkg.com/lucide@latest"></script>
<script src="/static/dist/js/dashboard.js"></script>
<script src="/static/dist/layout/base.js"></script>
  <script src="/static/dist/js/dashboard.js"></script>
</body>
</html>
