<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utilisateurs • SYBEM</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5',
                    }
                }
            }
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        .status-badge {
            padding: 4px 10px;
            border-radius: 9999px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }
        
        .status-active { background-color: #d1fae5; color: #065f46; }
        .dark .status-active { background-color: #065f4630; color: #34d399; }
        
        .status-inactive { background-color: #fee2e2; color: #991b1b; }
        .dark .status-inactive { background-color: #991b1b30; color: #f87171; }

        .custom-scrollbar::-webkit-scrollbar { height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>

<body class="bg-gray-50 dark:bg-slate-900 text-gray-900 dark:text-slate-100 min-h-screen">

<div id="sidebar"></div>
<div id="topbar"></div>

<main class="transition-all duration-300 pt-20 px-4 lg:pl-[300px] lg:pr-8 pb-10">
    
    <div class="max-w-7xl mx-auto">

        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <div>
                <h1 class="text-2xl font-bold text-slate-800 dark:text-white">Gestion des Utilisateurs</h1>
                <p class="text-sm text-slate-500 dark:text-slate-400">
                    Contrôle total des accès et des comptes de la plateforme
                </p>
            </div>

            <button onclick="openUserModal()"
                    class="flex items-center justify-center gap-2 px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl shadow-lg shadow-indigo-500/20 transition-all active:scale-95">
                <i data-lucide="user-plus" class="w-5 h-5"></i>
                <span class="font-semibold text-sm">Nouvel utilisateur</span>
            </button>
        </div>

        <div class="grid grid-cols-1 gap-6 mb-6">
            <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden">
                
                <div class="p-4 border-b dark:border-slate-700 bg-slate-50/50 dark:bg-slate-800/50">
                    <div class="flex flex-wrap gap-3">
                        <div class="flex-1 min-w-[200px]">
                            <select id="filter-role" class="w-full border rounded-lg px-3 py-2 text-sm dark:bg-slate-900 dark:border-slate-700 outline-none focus:ring-2 ring-indigo-500/20">
                                <option value="">Tous les rôles</option>
                                <option value="superadmin">Super Admin</option>
                                <option value="SCHOOL_ADMIN">Admin École</option>
                                <option value="teacher">Enseignant</option>
                                <option value="student">Élève</option>
                            </select>
                        </div>
                        <div class="flex-1 min-w-[200px]">
                            <select id="filter-school" class="w-full border rounded-lg px-3 py-2 text-sm dark:bg-slate-900 dark:border-slate-700 outline-none focus:ring-2 ring-indigo-500/20">
                                <option value="">Toutes les écoles</option>
                            </select>
                        </div>
                        <button onclick="resetFilters()" class="px-4 py-2 text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition-colors border dark:border-slate-700">
                            Réinitialiser
                        </button>
                    </div>
                </div>

                <div class="overflow-x-auto custom-scrollbar">
                    <table class="w-full text-sm">
                        <thead class="bg-slate-50 dark:bg-slate-900/50 text-slate-500 dark:text-slate-400 border-b dark:border-slate-700">
                            <tr>
                                <th class="px-6 py-4 text-left font-bold uppercase tracking-wider text-[11px]">Utilisateur</th>
                                <th class="px-6 py-4 text-center font-bold uppercase tracking-wider text-[11px]">Rôle</th>
                                <th class="px-6 py-4 text-center font-bold uppercase tracking-wider text-[11px] hidden sm:table-cell">École</th>
                                <th class="px-6 py-4 text-center font-bold uppercase tracking-wider text-[11px]">Statut</th>
                                <th class="px-6 py-4 text-right font-bold uppercase tracking-wider text-[11px]">Actions</th>
                            </tr>
                        </thead>

                        <tbody id="users-table" class="divide-y divide-slate-100 dark:divide-slate-700/50">
                            <tr id="loading-row">
                                <td colspan="5" class="px-6 py-12 text-center">
                                    <div class="flex flex-col items-center justify-center gap-3">
                                        <div class="w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                                        <p class="text-slate-500 animate-pulse">Synchronisation des données...</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>

<div id="userModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center z-[60] p-4 transition-all">
    <div class="bg-white dark:bg-slate-800 w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200">

        <div class="flex justify-between items-center px-6 py-4 border-b dark:border-slate-700 bg-slate-50/50 dark:bg-slate-800/50">
            <h2 id="modal-title" class="text-lg font-bold">Nouvel Utilisateur</h2>
            <button onclick="closeUserModal()" class="p-2 hover:bg-red-50 hover:text-red-500 rounded-full transition-colors">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <form id="userForm" onsubmit="event.preventDefault(); saveUser();" class="p-6 space-y-4">
            <input type="hidden" id="user-id">

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="space-y-1 sm:col-span-2">
                    <label class="text-xs font-bold text-slate-500 uppercase">Email professionnel</label>
                    <input id="email" type="email" required placeholder="nom@exemple.com"
                           class="w-full border rounded-xl px-4 py-2.5 dark:bg-slate-900 dark:border-slate-700 outline-none focus:ring-2 ring-indigo-500/20 transition-all">
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500 uppercase">Nom</label>
                    <input id="last_name" required placeholder="Nom"
                           class="w-full border rounded-xl px-4 py-2.5 dark:bg-slate-900 dark:border-slate-700 outline-none focus:ring-2 ring-indigo-500/20">
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500 uppercase">Prénom</label>
                    <input id="first_name" required placeholder="Prénom"
                           class="w-full border rounded-xl px-4 py-2.5 dark:bg-slate-900 dark:border-slate-700 outline-none focus:ring-2 ring-indigo-500/20">
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500 uppercase">Rôle</label>
                    <select id="role" required class="w-full border rounded-xl px-4 py-2.5 dark:bg-slate-900 dark:border-slate-700 outline-none">
                        <option value="">Choisir...</option>
                        <option value="superadmin">Super Admin</option>
                        <option value="SCHOOL_ADMIN">Admin École</option>
                        <option value="teacher">Enseignant</option>
                        <option value="student">Élève</option>
                    </select>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500 uppercase">École</label>
                    <select id="school" class="w-full border rounded-xl px-4 py-2.5 dark:bg-slate-900 dark:border-slate-700 outline-none">
                        <option value="">Aucune</option>
                    </select>
                </div>
            </div>

            <div id="password-fields" class="space-y-1">
                <label class="text-xs font-bold text-slate-500 uppercase">Sécurité</label>
                <input id="password" type="password" minlength="6"
                       placeholder="Mot de passe (min. 6 caractères)"
                       class="w-full border rounded-xl px-4 py-2.5 dark:bg-slate-900 dark:border-slate-700 outline-none">
            </div>

            <div class="flex justify-end gap-3 pt-6 border-t dark:border-slate-700">
                <button type="button" onclick="closeUserModal()" class="px-5 py-2.5 text-slate-600 dark:text-slate-400 font-medium hover:bg-slate-50 dark:hover:bg-slate-700 rounded-xl transition-colors">
                    Annuler
                </button>
                <button type="submit" id="modal-submit-btn" class="px-8 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg shadow-indigo-500/20 transition-all active:scale-95">
                    Enregistrer
                </button>
            </div>
        </form>
    </div>
</div>

<script src="/static/dist/layout/base.js"></script>
<script src="/static/dist/js/users.js"></script>

</body>
</html>
