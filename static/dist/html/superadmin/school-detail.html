<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <title>Détails École • SYBEM</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>

<body class="bg-gray-100 dark:bg-slate-900 text-gray-900 dark:text-slate-100">


<div id="sidebar"></div>
<div id="topbar"></div>


<main class="ml-[260px] mt-[64px] p-6">

    <div class="max-w-5xl mx-auto">

      
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-bold" id="school-name">Chargement…</h1>
                <p class="text-sm text-gray-500 dark:text-slate-400">
                    Détails de l’établissement
                </p>
            </div>

            <span id="school-status"
                  class="px-3 py-1 rounded-full text-xs font-semibold">
            </span>
        </div>

        
        <div class="bg-white dark:bg-slate-800 rounded-xl border dark:border-slate-700 shadow-sm p-6">

            <div class="grid grid-cols-2 gap-6 text-sm">
                <div>
                    <p class="text-gray-500 dark:text-slate-400">Code école</p>
                    <p class="font-medium" id="school-code">—</p>
                </div>

                <div>
                    <p class="text-gray-500 dark:text-slate-400">Date de création</p>
                    <p class="font-medium" id="school-created">—</p>
                </div>
            </div>

            <hr class="my-6 border-gray-200 dark:border-slate-700">

            <div class="flex gap-3">
                <button onclick="openEdit()"
                        class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg">
                    ✏️ Modifier
                </button>

                <button onclick="toggleStatus()"
                        class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg">
                    ⛔ Désactiver
                </button>
            </div>

        </div>
    </div>

</main>


<script src="/static/dist/layout/base.js"></script>


<script src="/static/dist/js/school-detail.js"></script>

</body>
</html>
