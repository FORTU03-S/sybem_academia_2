<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

    <!-- INIT THEME AVANT TOUT -->
    <script>
        if (localStorage.getItem("theme") === "dark") {
            document.documentElement.classList.add("dark");
        }
    </script>

    <title>Utilisateurs • SYBEM</title>

    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 dark:bg-slate-900">

<div id="sidebar"></div>
<div id="topbar"></div>

<main class="ml-[280px] mt-[64px] p-6">
    <div class="max-w-6xl mx-auto">

        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-slate-800 dark:text-white">
                Utilisateurs de l’école
            </h1>
            <a href="/static/dist/html/school_admin/create_users.html"
               class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700">
                + Nouvel utilisateur
            </a>
        </div>

        <div class="bg-white dark:bg-slate-800 rounded-xl shadow overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-slate-100 dark:bg-slate-700 text-left">
                <tr>
                    <th class="p-3">Nom</th>
                    <th>Email</th>
                    <th>Rôle</th>
                    <th>Statut</th>
                    <th>Date</th>
                    <th class="p-3">Actions</th>
                </tr>
                </thead>
                <tbody id="usersTable"></tbody>
            </table>
        </div>

    </div>
</main>

<script src="/static/dist/layout/base.js"></script>
<script src="/static/dist/js/school_admin/api.js"></script>
<script src="/static/dist/js/school_admin/users_list.js"></script>

</body>
</html>
