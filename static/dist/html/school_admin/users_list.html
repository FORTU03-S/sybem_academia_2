<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    
    <script>
        if (localStorage.getItem("theme") === "dark") {
            document.documentElement.classList.add("dark");
        }
    </script>

    <title>Utilisateurs • SYBEM</title>

    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            600: '#4f46e5',
                            700: '#4338ca'
                        },
                        slate: {
                            50: '#f8fafc',
                            800: '#1e293b',
                            900: '#0f172a'
                        },
                        status: {
                            active: '#10b981',
                            inactive: '#6b7280',
                            pending: '#f59e0b',
                            suspended: '#ef4444'
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-in-out',
                        'slide-up': 'slideUp 0.2s ease-out',
                        'scale-in': 'scaleIn 0.2s ease-out',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' }
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(10px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' }
                        },
                        scaleIn: {
                            '0%': { transform: 'scale(0.95)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' }
                        }
                    }
                }
            }
        }
    </script>
    
    
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* Styles pour mobile */
        @media (max-width: 768px) {
            .mobile-card-view {
                display: block;
            }
            
            .desktop-table-view {
                display: none;
            }
            
            .mobile-filters-view {
                display: block;
            }
            
            .desktop-filters-view {
                display: none;
            }
        }
        
        @media (min-width: 769px) {
            .mobile-card-view {
                display: none;
            }
            
            .desktop-table-view {
                display: table;
            }
            
            .mobile-filters-view {
                display: none;
            }
            
            .desktop-filters-view {
                display: grid;
            }
        }
        
        
        .card-hover {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        
        .dark .card-hover:hover {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            transition: all 0.2s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.3);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .input-field {
            transition: all 0.2s ease;
        }
        
        .input-field:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
    
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 3px;
        }
        
        .dark ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        
        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }
        
        /* Animation pour les lignes */
        .fade-in-row {
            animation: slideUp 0.3s ease-out;
            animation-fill-mode: both;
        }
        
        .fade-in-row:nth-child(1) { animation-delay: 0.05s; }
        .fade-in-row:nth-child(2) { animation-delay: 0.1s; }
        .fade-in-row:nth-child(3) { animation-delay: 0.15s; }
        .fade-in-row:nth-child(4) { animation-delay: 0.2s; }
        
        .status-badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-weight: 500;
        }
        
        .status-active {
            background-color: #d1fae5;
            color: #065f46;
        }
        
        .dark .status-active {
            background-color: #064e3b;
            color: #a7f3d0;
        }
        
        .status-inactive {
            background-color: #f3f4f6;
            color: #374151;
        }
        
        .dark .status-inactive {
            background-color: #374151;
            color: #d1d5db;
        }
        
        .status-pending {
            background-color: #fef3c7;
            color: #92400e;
        }
        
        .dark .status-pending {
            background-color: #92400e;
            color: #fde68a;
        }
        
        .status-suspended {
            background-color: #fee2e2;
            color: #991b1b;
        }
        
        .dark .status-suspended {
            background-color: #7f1d1d;
            color: #fca5a5;
        }
        
        .role-badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-weight: 500;
        }
        
        .role-teacher {
            background-color: #dbeafe;
            color: #1e40af;
        }
        
        .dark .role-teacher {
            background-color: #1e3a8a;
            color: #93c5fd;
        }
        
        .role-staff {
            background-color: #e0e7ff;
            color: #3730a3;
        }
        
        .dark .role-staff {
            background-color: #3730a3;
            color: #c7d2fe;
        }
        
        .role-school_admin {
            background-color: #fce7f3;
            color: #9d174d;
        }
        
        .dark .role-school_admin {
            background-color: #9d174d;
            color: #f9a8d4;
        }
        
        .filter-toggle-btn {
            transition: all 0.2s ease;
        }
        
        .filter-toggle-btn:hover {
            transform: translateY(-1px);
        }
    </style>
</head>

<body class="bg-gradient-to-br from-gray-50 to-gray-100 dark:from-slate-900 dark:to-slate-950 min-h-screen">

<div id="sidebar"></div>
<div id="topbar"></div>

<main class="ml-0 lg:ml-[280px] mt-[64px] p-4 md:p-6 transition-all duration-300 animate-fade-in">
    <div class="max-w-7xl mx-auto">

        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6 md:mb-8">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold text-slate-800 dark:text-white mb-2">
                    Utilisateurs de l'école
                </h1>
                <p class="text-sm text-gray-600 dark:text-gray-400">
                    Gérez tous les membres de votre établissement
                </p>
            </div>
            <a href="/static/dist/html/school_admin/create_users.html"
               class="btn-primary text-white px-5 py-3 rounded-xl hover:shadow-lg transition-all duration-200 flex items-center justify-center gap-2 w-full sm:w-auto font-medium">
                <i data-lucide="user-plus" class="w-5 h-5"></i>
                <span>Nouvel utilisateur</span>
            </a>
        </div>

        <div class="mobile-filters-view mb-6">
            <button id="mobileFilterToggle"
                    class="filter-toggle-btn w-full flex items-center justify-between px-4 py-3 bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-gray-200 dark:border-slate-700 hover:border-indigo-300 dark:hover:border-indigo-600 transition-colors">
                <div class="flex items-center gap-3">
                    <i data-lucide="filter" class="w-5 h-5 text-gray-600 dark:text-gray-400"></i>
                    <span class="font-medium text-slate-700 dark:text-slate-300">Filtres de recherche</span>
                </div>
                <i data-lucide="chevron-down" class="w-5 h-5 text-gray-600 dark:text-gray-400"></i>
            </button>
            
            <div id="mobileFiltersContainer" class="hidden mt-4">
                <div class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-gray-200 dark:border-slate-700 p-4 space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">
                            Rechercher
                        </label>
                        <input id="mobileSearchInput" type="text"
                               placeholder="Nom, email..."
                               class="input-field w-full px-4 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">
                            Type d'utilisateur
                        </label>
                        <select id="mobileTypeFilter"
                                class="input-field w-full px-4 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white">
                            <option value="">Tous les types</option>
                            <option value="teacher">Enseignant</option>
                            <option value="staff">Personnel</option>
                            <option value="school_admin">Admin école</option>
                        </select>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">
                                Date début
                            </label>
                            <input id="mobileStartDate" type="date"
                                   class="input-field w-full px-4 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">
                                Date fin
                            </label>
                            <input id="mobileEndDate" type="date"
                                   class="input-field w-full px-4 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white">
                        </div>
                    </div>
                    
                    <div class="flex gap-2 pt-2">
                        <button onclick="applyMobileFilters()"
                                class="btn-primary text-white px-5 py-2.5 rounded-lg font-medium flex-1">
                            Appliquer
                        </button>
                        <button onclick="resetMobileFilters()"
                                class="px-5 py-2.5 rounded-lg bg-gray-100 dark:bg-slate-700 text-gray-700 dark:text-gray-300 font-medium">
                            Réinitialiser
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="desktop-filters-view bg-white/90 dark:bg-slate-800/90 backdrop-blur-sm rounded-2xl shadow-sm border border-gray-200 dark:border-slate-700 p-4 md:p-6 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-5 gap-3 md:gap-4">
        
                <div class="md:col-span-2">
                    <div class="relative">
                        <i data-lucide="search" class="absolute left-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                        <input id="searchInput" type="text"
                               placeholder="Rechercher (nom, email, rôle)"
                               class="input-field w-full pl-10 pr-4 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white">
                    </div>
                </div>
                <div>
                    <select id="typeFilter"
                            class="input-field w-full px-4 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white">
                        <option value="">Tous les types</option>
                        <option value="teacher">Enseignant</option>
                        <option value="staff">Personnel</option>
                        <option value="school_admin">Admin école</option>
                    </select>
                </div>

        
                <div>
                    <input id="startDate" type="date"
                           class="input-field w-full px-4 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white">
                </div>

            
                <div>
                    <input id="endDate" type="date"
                           class="input-field w-full px-4 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white">
                </div>

                
                <div class="flex gap-2">
                    <button onclick="applyFilters()"
                            class="btn-primary text-white px-4 py-2.5 rounded-lg font-medium flex-1 flex items-center justify-center gap-2">
                        <i data-lucide="filter" class="w-4 h-4"></i>
                        <span class="hidden md:inline">Filtrer</span>
                    </button>
                    <button onclick="resetFilters()"
                            class="px-4 py-2.5 rounded-lg bg-gray-100 dark:bg-slate-700 text-gray-700 dark:text-gray-300 font-medium flex items-center justify-center">
                        <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
        </div>


        <div class="desktop-table-view bg-white/90 dark:bg-slate-800/90 backdrop-blur-sm rounded-2xl shadow-sm border border-gray-200 dark:border-slate-700 overflow-hidden">
            <div class="px-4 md:px-6 py-4 border-b border-gray-200 dark:border-slate-700 bg-gradient-to-r from-gray-50 to-gray-100 dark:from-slate-800 dark:to-slate-900">
                <div class="flex items-center justify-between">
                    <h2 class="text-lg md:text-xl font-bold text-slate-800 dark:text-white">
                        Liste des utilisateurs
                    </h2>
                    <span class="text-sm text-gray-600 dark:text-gray-400" id="usersCount">0 utilisateur(s)</span>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm md:text-base">
                    <thead class="bg-gradient-to-r from-gray-50 to-gray-100 dark:from-slate-800 dark:to-slate-900">
                        <tr>
                            <th class="p-4 md:p-6 text-left font-semibold text-slate-700 dark:text-slate-300">Nom</th>
                            <th class="p-4 md:p-6 text-left font-semibold text-slate-700 dark:text-slate-300">Email</th>
                            <th class="p-4 md:p-6 text-left font-semibold text-slate-700 dark:text-slate-300">Rôle</th>
                            <th class="p-4 md:p-6 text-left font-semibold text-slate-700 dark:text-slate-300">Statut</th>
                            <th class="p-4 md:p-6 text-left font-semibold text-slate-700 dark:text-slate-300">Date</th>
                            <th class="p-4 md:p-6 text-right font-semibold text-slate-700 dark:text-slate-300">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTable" class="divide-y divide-gray-100 dark:divide-slate-700">
                    
                    </tbody>
                </table>
            </div>
        </div>


        <div class="mobile-card-view space-y-4">
            <div id="mobileUsersContainer" class="space-y-4">
        
            </div>
        </div>

    </div>
</main>

<script src="/static/dist/layout/base.js"></script>
<script src="/static/dist/js/school_admin/api.js"></script>
<script src="/static/dist/js/school_admin/users_list.js"></script>

<script>
    
    document.addEventListener('DOMContentLoaded', function() {
        
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
        
    
        const mobileFilterToggle = document.getElementById('mobileFilterToggle');
        const mobileFiltersContainer = document.getElementById('mobileFiltersContainer');
        const chevronIcon = mobileFilterToggle?.querySelector('i[data-lucide="chevron-down"]');
        
        if (mobileFilterToggle && mobileFiltersContainer) {
            mobileFilterToggle.addEventListener('click', function() {
                const isHidden = mobileFiltersContainer.classList.contains('hidden');
                
                if (isHidden) {
                    mobileFiltersContainer.classList.remove('hidden');
                    mobileFiltersContainer.classList.add('animate-fade-in');
                    if (chevronIcon) {
                        chevronIcon.setAttribute('data-lucide', 'chevron-up');
                        if (typeof lucide !== 'undefined') {
                            lucide.createIcons();
                        }
                    }
                } else {
                    mobileFiltersContainer.classList.add('hidden');
                    if (chevronIcon) {
                        chevronIcon.setAttribute('data-lucide', 'chevron-down');
                        if (typeof lucide !== 'undefined') {
                            lucide.createIcons();
                        }
                    }
                }
            });
        }
        
        function syncFiltersToMobile() {
            const searchInput = document.getElementById('searchInput');
            const typeFilter = document.getElementById('typeFilter');
            const startDate = document.getElementById('startDate');
            const endDate = document.getElementById('endDate');
            
            const mobileSearchInput = document.getElementById('mobileSearchInput');
            const mobileTypeFilter = document.getElementById('mobileTypeFilter');
            const mobileStartDate = document.getElementById('mobileStartDate');
            const mobileEndDate = document.getElementById('mobileEndDate');
            
            if (searchInput && mobileSearchInput) {
                mobileSearchInput.value = searchInput.value;
            }
            
            if (typeFilter && mobileTypeFilter) {
                mobileTypeFilter.value = typeFilter.value;
            }
            
            if (startDate && mobileStartDate) {
                mobileStartDate.value = startDate.value;
            }
            
            if (endDate && mobileEndDate) {
                mobileEndDate.value = endDate.value;
            }
        }
    
        function syncFiltersToDesktop() {
            const mobileSearchInput = document.getElementById('mobileSearchInput');
            const mobileTypeFilter = document.getElementById('mobileTypeFilter');
            const mobileStartDate = document.getElementById('mobileStartDate');
            const mobileEndDate = document.getElementById('mobileEndDate');
            
            const searchInput = document.getElementById('searchInput');
            const typeFilter = document.getElementById('typeFilter');
            const startDate = document.getElementById('startDate');
            const endDate = document.getElementById('endDate');
            
            if (searchInput && mobileSearchInput) {
                searchInput.value = mobileSearchInput.value;
            }
            
            if (typeFilter && mobileTypeFilter) {
                typeFilter.value = mobileTypeFilter.value;
            }
            
            if (startDate && mobileStartDate) {
                startDate.value = mobileStartDate.value;
            }
            
            if (endDate && mobileEndDate) {
                endDate.value = mobileEndDate.value;
            }
        }
        
        
        window.applyMobileFilters = function() {
            syncFiltersToDesktop();
            if (typeof window.applyFilters === 'function') {
                window.applyFilters();
            }
            
            if (mobileFiltersContainer) {
                mobileFiltersContainer.classList.add('hidden');
                if (chevronIcon) {
                    chevronIcon.setAttribute('data-lucide', 'chevron-down');
                    if (typeof lucide !== 'undefined') {
                        lucide.createIcons();
                    }
                }
            }
        };
        
        window.resetMobileFilters = function() {
            const mobileSearchInput = document.getElementById('mobileSearchInput');
            const mobileTypeFilter = document.getElementById('mobileTypeFilter');
            const mobileStartDate = document.getElementById('mobileStartDate');
            const mobileEndDate = document.getElementById('mobileEndDate');
            
            if (mobileSearchInput) mobileSearchInput.value = '';
            if (mobileTypeFilter) mobileTypeFilter.value = '';
            if (mobileStartDate) mobileStartDate.value = '';
            if (mobileEndDate) mobileEndDate.value = '';
            
            syncFiltersToDesktop();
            
            if (typeof window.resetFilters === 'function') {
                window.resetFilters();
            }
    
            if (mobileFiltersContainer) {
                mobileFiltersContainer.classList.add('hidden');
                if (chevronIcon) {
                    chevronIcon.setAttribute('data-lucide', 'chevron-down');
                    if (typeof lucide !== 'undefined') {
                        lucide.createIcons();
                    }
                }
            }
        };
        
        window.resetFilters = function() {
            const searchInput = document.getElementById('searchInput');
            const typeFilter = document.getElementById('typeFilter');
            const startDate = document.getElementById('startDate');
            const endDate = document.getElementById('endDate');
            
            if (searchInput) searchInput.value = '';
            if (typeFilter) typeFilter.value = '';
            if (startDate) startDate.value = '';
            if (endDate) endDate.value = '';
            
            syncFiltersToMobile();
            
            if (typeof window.applyFilters === 'function') {
                window.applyFilters();
            }
        };
        
        setTimeout(syncFiltersToMobile, 1000);
        
        function updateMobileView() {
            const desktopTable = document.getElementById('usersTable');
            const mobileContainer = document.getElementById('mobileUsersContainer');
            const countElement = document.getElementById('usersCount');
            
            if (!desktopTable || !mobileContainer) return;
            
            
            const rows = desktopTable.querySelectorAll('tr');
            mobileContainer.innerHTML = '';
            let count = 0;
            
            
            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                if (cells.length >= 5) {
                    count++;
                    
                    const name = cells[0].textContent || '';
                    const email = cells[1].textContent || '';
                    const role = cells[2].textContent || '';
                    const status = cells[3].textContent || '';
                    const date = cells[4].textContent || '';
                    const actions = cells[5]?.innerHTML || '';
                    
                    
                    let roleClass = 'bg-gray-100 text-gray-800';
                    let roleText = role;
                    
                    if (role.includes('Enseignant')) {
                        roleClass = 'role-teacher';
                        roleText = 'Enseignant';
                    } else if (role.includes('Personnel')) {
                        roleClass = 'role-staff';
                        roleText = 'Personnel';
                    } else if (role.includes('Admin')) {
                        roleClass = 'role-school_admin';
                        roleText = 'Admin';
                    }
                    
            
                    let statusClass = 'status-inactive';
                    let statusText = status;
                    
                    if (status.includes('Actif')) {
                        statusClass = 'status-active';
                        statusText = 'Actif';
                    } else if (status.includes('En attente')) {
                        statusClass = 'status-pending';
                        statusText = 'En attente';
                    } else if (status.includes('Suspendu')) {
                        statusClass = 'status-suspended';
                        statusText = 'Suspendu';
                    }
                    
            
                    const card = document.createElement('div');
                    card.className = 'card-hover bg-white dark:bg-slate-800 rounded-xl p-4 border border-gray-200 dark:border-slate-700 fade-in-row';
                    
            
                    card.innerHTML = `
                        <div class="space-y-3">
                            <div class="flex justify-between items-start">
                                <div class="flex-1">
                                    <h3 class="font-semibold text-slate-800 dark:text-white text-base">${name}</h3>
                                    <div class="flex items-center gap-2 mt-2">
                                        <i data-lucide="mail" class="w-4 h-4 text-gray-500"></i>
                                        <span class="text-sm text-gray-600 dark:text-gray-400 truncate">${email}</span>
                                    </div>
                                </div>
                                <div class="flex gap-2">
                                    ${actions.replace(/btn-sm/g, 'btn-xs')}
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <span class="text-xs text-gray-500 dark:text-gray-400 mb-1 block">Rôle</span>
                                    <span class="${roleClass} role-badge">${roleText}</span>
                                </div>
                                <div>
                                    <span class="text-xs text-gray-500 dark:text-gray-400 mb-1 block">Statut</span>
                                    <span class="${statusClass} status-badge">${statusText}</span>
                                </div>
                            </div>
                            
                            <div class="flex items-center justify-between pt-3 border-t border-gray-100 dark:border-slate-700">
                                <div class="flex items-center gap-2">
                                    <i data-lucide="calendar" class="w-4 h-4 text-gray-500"></i>
                                    <span class="text-sm text-gray-600 dark:text-gray-400">${date}</span>
                                </div>
                            </div>
                        </div>
                    `;
                    
                    mobileContainer.appendChild(card);
                }
            });
            

            if (countElement) countElement.textContent = `${count} utilisateur(s)`;
            
    
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        }
        
        
        const observer = new MutationObserver(function(mutations) {
            let shouldUpdate = false;
            mutations.forEach(mutation => {
                if (mutation.type === 'childList' && mutation.addedNodes.length > 0) {
                    shouldUpdate = true;
                }
            });
            if (shouldUpdate) {
                updateMobileView();
            }
        });
        
        const tableBody = document.getElementById('usersTable');
        
        if (tableBody) {
            observer.observe(tableBody, { 
                childList: true, 
                subtree: true,
                characterData: true 
            });
        }
        
        setTimeout(updateMobileView, 1000);
        
        const checkForTableData = setInterval(() => {
            const tableRows = document.querySelectorAll('#usersTable tr');
            if (tableRows.length > 0) {
                updateMobileView();
                clearInterval(checkForTableData);
            }
        }, 500);
        
        setTimeout(() => clearInterval(checkForTableData), 10000);
        
        window.addEventListener('resize', updateMobileView);
        
        function addAnimationToRows() {
            const rows = document.querySelectorAll('#usersTable tr');
            rows.forEach((row, index) => {
                if (row.querySelector('td')) {
                    row.classList.add('fade-in-row');
                    row.style.animationDelay = `${index * 0.05}s`;
                }
            });
        }

        const animationObserver = new MutationObserver(addAnimationToRows);
        if (tableBody) {
            animationObserver.observe(tableBody, { childList: true });
        }
        setTimeout(addAnimationToRows, 1500);
    });
</script>

</body>
</html>
