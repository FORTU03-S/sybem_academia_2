<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <script>
  if (localStorage.getItem("theme") === "dark") {
    document.documentElement.classList.add("dark");
  }
</script>

    <title>Créer / Inviter un utilisateur • SYBEM</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
</head>

<body class="bg-gray-100 dark:bg-slate-900 text-gray-800 dark:text-slate-100">

<!-- Layout global -->
<div id="sidebar"></div>
<div id="topbar"></div>

<main class="ml-[260px] mt-[64px] p-6">

    <div class="max-w-5xl mx-auto space-y-6">

        <!-- Titre -->
        <div>
            <h1 class="text-2xl font-bold">
                Créer ou inviter un utilisateur
            </h1>
            <p class="text-sm text-gray-500 dark:text-slate-400">
                Ajoutez un nouvel utilisateur à votre établissement ou invitez-le par email.
            </p>
        </div>

        <!-- FORM -->
        <form id="userForm"
              class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm p-6 space-y-8">

            <!-- SECTION : Identité -->
            <div>
                <h2 class="text-lg font-semibold mb-4">
                    Informations personnelles
                </h2>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm mb-1">Nom</label>
                        <input type="text" name="last_name" required
                               class="w-full px-3 py-2 rounded-lg border bg-transparent">
                    </div>

                    <div>
                        <label class="block text-sm mb-1">Post-nom</label>
                        <input type="text" name="middle_name" required
                               class="w-full px-3 py-2 rounded-lg border bg-transparent">
                    </div>

                    <div>
                        <label class="block text-sm mb-1">Prénom</label>
                        <input type="text" name="first_name" required
                               class="w-full px-3 py-2 rounded-lg border bg-transparent">
                    </div>
                </div>

                <div class="mt-4">
                    <label class="block text-sm mb-1">Email</label>
                    <input type="email" name="email" required
                           class="w-full px-3 py-2 rounded-lg border bg-transparent">
                </div>
            </div>

            <!-- SECTION : Photo -->
            <div>
                <h2 class="text-lg font-semibold mb-4">
                    Photo de profil
                </h2>

                <div class="flex items-center gap-4">
                    <input type="file" id="photoInput" accept="image/*"
                           class="block text-sm">

                    <img id="photoPreview"
                         class="h-20 w-20 rounded-full hidden border">
                </div>
            </div>

            <!-- SECTION : Rôle -->
            <div>
                <h2 class="text-lg font-semibold mb-4">
                    Rôle de l’utilisateur
                </h2>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <label class="flex items-center gap-2 p-3 border rounded-lg cursor-pointer">
                        <input type="radio" name="role" value="ADMIN" required>
                        <span>Administrateur</span>
                    </label>

                    <label class="flex items-center gap-2 p-3 border rounded-lg cursor-pointer">
                        <input type="radio" name="role" value="TEACHER">
                        <span>Enseignant</span>
                    </label>

                    <label class="flex items-center gap-2 p-3 border rounded-lg cursor-pointer">
                        <input type="radio" name="role" value="PARENT">
                        <span>Parent</span>
                    </label>

                    <label class="flex items-center gap-2 p-3 border rounded-lg cursor-pointer">
                        <input type="radio" name="role" value="ACCOUNTANT">
                        <span>Comptable</span>
                    </label>
                </div>
            </div>

            <!-- SECTION : Mode -->
            <div>
                <h2 class="text-lg font-semibold mb-4">
                    Mode de création
                </h2>

                <select name="mode"
                        class="w-full md:w-1/2 px-3 py-2 rounded-lg border bg-transparent">
                    <option value="create">Créer maintenant</option>
                    <option value="invite">Inviter par email</option>
                </select>
            </div>

            <!-- ACTIONS -->
            <div class="flex justify-end gap-3 pt-4 border-t">
                <a href="/static/dist/html/school_admin/users_list.html"
                   class="px-4 py-2 rounded-lg border">
                    Annuler
                </a>

                <button type="submit"
                        class="px-5 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700">
                    Créer l’utilisateur
                </button>
            </div>
        </form>

        <!-- RESULT -->
        <div id="result" class="text-sm font-medium"></div>

    </div>
</main>

<!-- Scripts globaux -->
<script src="/static/dist/layout/base.js"></script>

<!-- Scripts page -->
<script src="/static/dist/js/school_admin/api.js"></script>
<script src="/static/dist/js/school_admin/upload_photo.js"></script>
<script src="/static/dist/js/school_admin/create_users.js"></script>

</body>
</html>
