<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Cours de la Classe • SYBEM</title>
    
    <!-- Tailwind CSS avec configuration -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            600: '#4f46e5',
                            700: '#4338ca'
                        },
                        slate: {
                            50: '#f8fafc',
                            800: '#1e293b',
                            900: '#0f172a'
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-in-out',
                        'slide-up': 'slideUp 0.2s ease-out',
                        'scale-in': 'scaleIn 0.2s ease-out',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' }
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(10px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' }
                        },
                        scaleIn: {
                            '0%': { transform: 'scale(0.95)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' }
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide/dist/lucide.js"></script>
    
    <style>
        /* Styles pour mobile */
        @media (max-width: 768px) {
            .mobile-card-view {
                display: block;
            }
            
            .desktop-table-view {
                display: none;
            }
            
            .mobile-form-view {
                display: block;
            }
            
            .desktop-form-view {
                display: none;
            }
        }
        
        @media (min-width: 769px) {
            .mobile-card-view {
                display: none;
            }
            
            .desktop-table-view {
                display: table;
            }
            
            .mobile-form-view {
                display: none;
            }
            
            .desktop-form-view {
                display: block;
            }
        }
        
        /* Effets modernes */
        .card-hover {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        
        .dark .card-hover:hover {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            transition: all 0.2s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.3);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .input-field {
            transition: all 0.2s ease;
        }
        
        .input-field:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        
        /* Scrollbar personnalisée */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 3px;
        }
        
        .dark ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        
        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }
        
        /* Animation pour les lignes */
        .fade-in-row {
            animation: slideUp 0.3s ease-out;
            animation-fill-mode: both;
        }
        
        .fade-in-row:nth-child(1) { animation-delay: 0.05s; }
        .fade-in-row:nth-child(2) { animation-delay: 0.1s; }
        .fade-in-row:nth-child(3) { animation-delay: 0.15s; }
        .fade-in-row:nth-child(4) { animation-delay: 0.2s; }
        
        /* Badge pour coefficient */
        .weight-badge {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
        }
        
        /* Toggle switch moderne */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #d1d5db;
            transition: .4s;
            border-radius: 24px;
        }
        
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        
        input:checked + .toggle-slider {
            background-color: #4f46e5;
        }
        
        input:checked + .toggle-slider:before {
            transform: translateX(20px);
        }
        
        .dark .toggle-slider {
            background-color: #4b5563;
        }
        
        .dark input:checked + .toggle-slider {
            background-color: #6366f1;
        }
    </style>
</head>

<script>
    // Script pour gérer la vue mobile (sans toucher à la logique existante)
    document.addEventListener('DOMContentLoaded', function() {
        // Initialiser les icônes Lucide
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
        
        // Synchroniser les selects avec la version mobile
        function syncSelects() {
            const courseSelect = document.getElementById('courseSelect');
            const teacherSelect = document.getElementById('teacherSelect');
            const mobileCourseSelect = document.getElementById('mobileCourseSelect');
            const mobileTeacherSelect = document.getElementById('mobileTeacherSelect');
            
            if (courseSelect && mobileCourseSelect) {
                mobileCourseSelect.innerHTML = courseSelect.innerHTML;
            }
            
            if (teacherSelect && mobileTeacherSelect) {
                mobileTeacherSelect.innerHTML = teacherSelect.innerHTML;
            }
        }
        
        // Gérer le modal mobile
        const mobileAddBtn = document.getElementById('mobileAddSubjectBtn');
        const mobileModal = document.getElementById('mobileAssignmentModal');
        const closeMobileModalBtn = document.getElementById('closeMobileModalBtn');
        const cancelMobileModalBtn = document.getElementById('cancelMobileModalBtn');
        
        if (mobileAddBtn && mobileModal) {
            mobileAddBtn.addEventListener('click', function() {
                syncSelects();
                mobileModal.classList.remove('hidden');
            });
        }
        
        if (closeMobileModalBtn) {
            closeMobileModalBtn.addEventListener('click', function() {
                mobileModal.classList.add('hidden');
            });
        }
        
        if (cancelMobileModalBtn) {
            cancelMobileModalBtn.addEventListener('click', function() {
                mobileModal.classList.add('hidden');
            });
        }
        
        // Soumission du formulaire mobile
        const mobileForm = document.getElementById('mobileAssignmentForm');
        if (mobileForm) {
            mobileForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                // Utiliser le formulaire principal pour la soumission
                const mainForm = document.getElementById('assignmentForm');
                if (mainForm) {
                    // Copier les valeurs du formulaire mobile vers le formulaire principal
                    const mobileData = new FormData(mobileForm);
                    const mainData = new FormData(mainForm);
                    
                    for (let [key, value] of mobileData.entries()) {
                        if (key === 'course' || key === 'teacher') {
                            // Mettre à jour les selects principaux
                            const select = mainForm.querySelector(`[name="${key}"]`);
                            if (select) {
                                select.value = value;
                            }
                        } else {
                            // Mettre à jour les autres champs
                            const input = mainForm.querySelector(`[name="${key}"]`);
                            if (input) {
                                if (input.type === 'checkbox') {
                                    input.checked = value === 'on';
                                } else {
                                    input.value = value;
                                }
                            }
                        }
                    }
                    
                    // Soumettre le formulaire principal
                    mainForm.dispatchEvent(new Event('submit', { bubbles: true }));
                    
                    // Fermer le modal
                    mobileModal.classList.add('hidden');
                    
                    // Réinitialiser le formulaire mobile
                    mobileForm.reset();
                }
            });
        }
        
        // Fonction pour mettre à jour la vue mobile
        function updateMobileView() {
            const desktopTable = document.getElementById('assignmentsTable');
            const mobileContainer = document.getElementById('mobileAssignmentsContainer');
            const countElement = document.getElementById('assignmentsCount');
            const mobileCountElement = document.getElementById('mobileAssignmentsCount');
            
            if (!desktopTable || !mobileContainer) return;
            
            // Sélectionner toutes les lignes du tableau
            const rows = desktopTable.querySelectorAll('tr');
            mobileContainer.innerHTML = '';
            let count = 0;
            
            // Filtrer les lignes vides
            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                if (cells.length >= 3) {
                    count++;
                    // Récupérer les données
                    const courseName = cells[0].textContent || '';
                    const teacherName = cells[1].textContent || 'Non assigné';
                    const weight = cells[2].textContent || '1';
                    const actions = cells[3]?.innerHTML || '';
                    const isEvaluative = row.dataset.evaluative || 'true';
                    
                    // Créer la carte mobile
                    const card = document.createElement('div');
                    card.className = 'card-hover bg-white dark:bg-slate-800 rounded-xl p-4 border border-gray-200 dark:border-slate-700 fade-in-row';
                    
                    // Construire le HTML de la carte
                    card.innerHTML = `
                        <div class="space-y-3">
                            <div class="flex justify-between items-start">
                                <div class="flex-1">
                                    <h3 class="font-semibold text-slate-800 dark:text-white text-base">${courseName}</h3>
                                    <div class="flex items-center gap-3 mt-2">
                                        <div class="flex items-center gap-2">
                                            <i data-lucide="user" class="w-4 h-4 text-gray-500"></i>
                                            <span class="text-sm text-gray-600 dark:text-gray-400">${teacherName}</span>
                                        </div>
                                        <div class="flex items-center gap-2">
                                            <i data-lucide="scale" class="w-4 h-4 text-gray-500"></i>
                                            <span class="weight-badge text-sm font-medium px-2 py-1 bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400 rounded">Coeff ${weight}</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="flex gap-2 ml-4">
                                    ${actions.replace(/btn-sm/g, 'btn-xs')}
                                </div>
                            </div>
                            <div class="flex items-center justify-between pt-3 border-t border-gray-100 dark:border-slate-700">
                                <div class="flex items-center gap-2">
                                    ${isEvaluative === 'true' ? `
                                        <span class="inline-flex items-center gap-1 px-2 py-1 bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400 rounded text-xs">
                                            <i data-lucide="check-circle" class="w-3 h-3"></i>
                                            Notée
                                        </span>
                                    ` : `
                                        <span class="inline-flex items-center gap-1 px-2 py-1 bg-gray-100 dark:bg-gray-900/30 text-gray-700 dark:text-gray-400 rounded text-xs">
                                            <i data-lucide="circle" class="w-3 h-3"></i>
                                            Non notée
                                        </span>
                                    `}
                                </div>
                            </div>
                        </div>
                    `;
                    
                    mobileContainer.appendChild(card);
                }
            });
            
            // Mettre à jour les compteurs
            if (countElement) countElement.textContent = `${count} matière(s)`;
            if (mobileCountElement) mobileCountElement.textContent = `${count} matière(s)`;
            
            // Réinitialiser les icônes Lucide
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        }
        
        // Observer les changements dans le tableau
        const observer = new MutationObserver(function(mutations) {
            let shouldUpdate = false;
            mutations.forEach(mutation => {
                if (mutation.type === 'childList' && mutation.addedNodes.length > 0) {
                    shouldUpdate = true;
                }
            });
            if (shouldUpdate) {
                updateMobileView();
            }
        });
        
        const tableBody = document.getElementById('assignmentsTable');
        
        if (tableBody) {
            observer.observe(tableBody, { 
                childList: true, 
                subtree: true,
                characterData: true 
            });
        }
        
        // Mettre à jour la vue mobile au chargement
        setTimeout(updateMobileView, 1000);
        
        // Surveiller les changements de contenu
        const checkForTableData = setInterval(() => {
            const tableRows = document.querySelectorAll('#assignmentsTable tr');
            if (tableRows.length > 0) {
                updateMobileView();
                clearInterval(checkForTableData);
            }
        }, 500);
        
        // Annuler après 10 secondes max
        setTimeout(() => clearInterval(checkForTableData), 10000);
        
        // Mettre à jour la vue mobile au redimensionnement
        window.addEventListener('resize', updateMobileView);
        
        // Ajouter des classes d'animation aux lignes du tableau desktop
        function addAnimationToRows() {
            const rows = document.querySelectorAll('#assignmentsTable tr');
            rows.forEach((row, index) => {
                if (row.querySelector('td')) {
                    row.classList.add('fade-in-row');
                    row.style.animationDelay = `${index * 0.05}s`;
                }
            });
        }
        
        // Observer pour ajouter les animations
        const animationObserver = new MutationObserver(addAnimationToRows);
        if (tableBody) {
            animationObserver.observe(tableBody, { childList: true });
        }
        setTimeout(addAnimationToRows, 1500);
        
        // Synchroniser les selects après chargement
        setTimeout(syncSelects, 2000);
    });
</script> 

</body>
