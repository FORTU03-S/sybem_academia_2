<!DOCTYPE html>
<html lang="fr" class="light">
<head>
    <meta charset="UTF-8">
    <title>Comptabilité | SYBEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-900">

    <div id="sidebar"></div> <main class="lg:ml-[280px] p-8">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-800 dark:text-white tracking-tight">Gestion Financière</h1>
                <p class="text-slate-500 font-medium" id="current-year-display">Année Académique: Chargement...</p>
            </div>
            <div class="flex gap-3">
                 <button class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl font-bold transition shadow-lg shadow-indigo-200 flex items-center gap-2">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i> Nouveau Paiement
                 </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
            <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-sm">
                <div class="text-emerald-500 bg-emerald-50 w-12 h-12 rounded-2xl flex items-center justify-center mb-4"><i data-lucide="arrow-down-left"></i></div>
                <p class="text-slate-500 text-sm font-bold uppercase tracking-wider">Recettes</p>
                <h2 class="text-3xl font-black text-slate-800 dark:text-white" id="kpi-income">$0</h2>
            </div>
            <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-sm">
                <div class="text-red-500 bg-red-50 w-12 h-12 rounded-2xl flex items-center justify-center mb-4"><i data-lucide="arrow-up-right"></i></div>
                <p class="text-slate-500 text-sm font-bold uppercase tracking-wider">Dépenses</p>
                <h2 class="text-3xl font-black text-slate-800 dark:text-white" id="kpi-expense">$0</h2>
            </div>
            <div class="bg-indigo-600 p-6 rounded-3xl shadow-xl shadow-indigo-100">
                <div class="text-white bg-white/20 w-12 h-12 rounded-2xl flex items-center justify-center mb-4"><i data-lucide="wallet"></i></div>
                <p class="text-white/80 text-sm font-bold uppercase tracking-wider">Solde Net</p>
                <h2 class="text-3xl font-black text-white" id="kpi-net">$0</h2>
            </div>
            <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-sm">
                <div class="text-amber-500 bg-amber-50 w-12 h-12 rounded-2xl flex items-center justify-center mb-4"><i data-lucide="clock"></i></div>
                <p class="text-slate-500 text-sm font-bold uppercase tracking-wider">À Percevoir</p>
                <h2 class="text-3xl font-black text-slate-800 dark:text-white" id="kpi-pending">$0</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-10">
            <div class="lg:col-span-2 bg-white dark:bg-slate-800 p-8 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-sm">
                <h3 class="text-xl font-bold text-slate-800 dark:text-white mb-6">Trésorerie Mensuelle</h3>
                <div class="h-80"><canvas id="mainChart"></canvas></div>
            </div>
            <div class="bg-white dark:bg-slate-800 p-8 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-sm">
                <h3 class="text-xl font-bold text-slate-800 dark:text-white mb-6">Répartition par Frais</h3>
                <div class="h-80 flex items-center justify-center"><canvas id="doughnutChart"></canvas></div>
            </div>
        </div>

        <div class="bg-white dark:bg-slate-800 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden">
             <div class="p-6 border-b dark:border-slate-700">
                <h3 class="text-xl font-bold text-slate-800 dark:text-white">Flux des Transactions</h3>
             </div>
             <table class="w-full text-left">
                <thead class="bg-slate-50 dark:bg-slate-900">
                    <tr class="text-slate-400 text-xs uppercase font-black">
                        <th class="px-6 py-4">Élève</th>
                        <th class="px-6 py-4">Motif</th>
                        <th class="px-6 py-4">Montant</th>
                        <th class="px-6 py-4">Date</th>
                        <th class="px-6 py-4 text-center">Statut</th>
                    </tr>
                </thead>
                <tbody id="payment-table-body" class="divide-y divide-slate-100 dark:divide-slate-700">
                    </tbody>
             </table>
        </div>
    </main>

    <script src="/static/dist/layout/base.js"></script>
    <script>
        // Logique Fetch et Chart
        async function initDashboard() {
            const token = localStorage.getItem('access_token');
            const response = await fetch('/api/finances/accounting-dashboard/', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();

            // Remplir les KPIs
            document.getElementById('current-year-display').innerText = `Année Académique: ${data.year_name}`;
            document.getElementById('kpi-income').innerText = `${data.kpis.total_income} $`;
            document.getElementById('kpi-expense').innerText = `${data.kpis.total_expenses} $`;
            document.getElementById('kpi-net').innerText = `${data.kpis.net_balance} $`;
            document.getElementById('kpi-pending').innerText = `${data.kpis.pending_fees} $`;

            // Chart Courbe (Revenus vs Dépenses)
            const months = ["Jan", "Fév", "Mar", "Avr", "Mai", "Juin", "Juil", "Août", "Sep", "Oct", "Nov", "Déc"];
            new Chart(document.getElementById('mainChart'), {
                type: 'line',
                data: {
                    labels: months,
                    datasets: [
                        { label: 'Recettes', data: months.map((_, i) => data.charts.cashflow.income[i+1] || 0), borderColor: '#10b981', tension: 0.4, fill: true, backgroundColor: 'rgba(16, 185, 129, 0.1)' },
                        { label: 'Dépenses', data: months.map((_, i) => data.charts.cashflow.expenses[i+1] || 0), borderColor: '#ef4444', tension: 0.4 }
                    ]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
            });

            // Doughnut Chart
            new Chart(document.getElementById('doughnutChart'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(data.charts.distribution),
                    datasets: [{ data: Object.values(data.charts.distribution), backgroundColor: ['#6366f1', '#f59e0b', '#ec4899', '#10b981'] }]
                }
            });

            // Tableau
            const tbody = document.getElementById('payment-table-body');
            tbody.innerHTML = data.recent_payments.map(p => `
                <tr class="hover:bg-slate-50 transition">
                    <td class="px-6 py-4 font-bold text-slate-700 dark:text-slate-300">${p.student}</td>
                    <td class="px-6 py-4 text-slate-500">${p.category}</td>
                    <td class="px-6 py-4 font-black">${p.amount} $</td>
                    <td class="px-6 py-4 text-slate-400 text-sm">${p.date}</td>
                    <td class="px-6 py-4 text-center">
                        <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase ${p.status === 'COMPLETED' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}">
                            ${p.status}
                        </span>
                    </td>
                </tr>
            `).join('');
        }
        initDashboard();
    </script>
</body>
</html>
