<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="theme-color" content="#4f46e5">
    
    <script>
        if (localStorage.getItem("theme") === "dark") {
            document.documentElement.classList.add("dark");
        }
    </script>

    <title>Cahier de Cotes • SYBEM</title>

    <!-- Fonts & Tailwind -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { 'inter': ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' },
                        danger: '#ef4444',
                        warning: '#f59e0b',
                        success: '#10b981'
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        * { font-family: 'Inter', sans-serif; }
        .table-container { overflow-x: auto; scrollbar-width: thin; }
        .grade-input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
        /* Empêcher le défilement horizontal sur mobile hors du tableau */
        body { overflow-x: hidden; }
    </style>
</head>

<body class="bg-gray-50 dark:bg-gray-900 min-h-screen">

<!-- Inclusion dynamique des composants de layout via tes scripts static -->
<div id="sidebar"></div>
<div id="topbar"></div>

<main class="lg:ml-[280px] pt-16 min-h-screen animate-fade-in">
    <div class="px-4 sm:px-6 lg:px-8 py-6">
        
        <!-- Header -->
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Cahier de Cotes Dynamique</h1>
                <p id="gradebookSub" class="text-gray-500 dark:text-gray-400">Gestion des notes et synchronisation en temps réel</p>
            </div>
              <a href="/static/dist/html/teacher/evaluations_setup.html" class="flex items-center gap-2 px-4 py-2 bg-primary-600 text-white rounded-lg text-sm font-medium hover:bg-primary-700 transition-all shadow-md">
                    <i data-lucide="settings-2" class="w-4 h-4"></i> Configurer Évaluations
                </a>
            <div class="flex gap-2">
                <button onclick="requestPrint()" class="flex items-center gap-2 px-4 py-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 transition-all">
                    <i data-lucide="printer" class="w-4 h-4"></i> Imprimer
                </button>
                <button onclick="requestEdit()" class="flex items-center gap-2 px-4 py-2 bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-700 rounded-lg text-sm font-medium text-amber-700 dark:text-amber-400 hover:bg-amber-100 transition-all">
                    <i data-lucide="edit-3" class="w-4 h-4"></i> Demander Modification
                </button>
            </div>
        </div>

        <!-- Filtres API -->
        <div class="bg-white dark:bg-gray-800 rounded-xl p-4 border border-gray-200 dark:border-gray-700 mb-6 grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Ma Charge Horaire (Assignations)</label>
                <select id="courseSelect" onchange="loadGradebook()" class="w-full bg-gray-50 dark:bg-gray-700 border-none rounded-lg p-2.5 text-sm dark:text-white focus:ring-2 focus:ring-primary-500">
                    <option value="">Chargement des cours...</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Période d'Évaluation</label>
                <select id="periodFilter" onchange="loadGradebook()" class="w-full bg-gray-50 dark:bg-gray-700 border-none rounded-lg p-2.5 text-sm dark:text-white focus:ring-2 focus:ring-primary-500">
                    <!-- Les options ici doivent idéalement être chargées via GradingPeriodSerializer -->
                    <option value="">-- Choisir la période --</option>
                </select>
            </div>
            <div class="flex gap-2">
                <div class="flex-1">
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Date d'Exécution</label>
                    <input type="date" id="evalDate" class="w-full bg-gray-50 dark:bg-gray-700 border-none rounded-lg p-2.5 text-sm dark:text-white">
                </div>
            </div>
        </div>

        <!-- Stats dynamiques calculées depuis les données API -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
            <div class="bg-white dark:bg-gray-800 p-4 rounded-xl border-l-4 border-success shadow-sm">
                <p class="text-xs text-gray-500 font-bold uppercase">Réussites</p>
                <h3 id="statSuccess" class="text-2xl font-bold text-gray-900 dark:text-white">0</h3>
            </div>
            <div class="bg-white dark:bg-gray-800 p-4 rounded-xl border-l-4 border-warning shadow-sm">
                <p class="text-xs text-gray-500 font-bold uppercase">Médiocres</p>
                <h3 id="statWarning" class="text-2xl font-bold text-gray-900 dark:text-white">0</h3>
            </div>
            <div class="bg-white dark:bg-gray-800 p-4 rounded-xl border-l-4 border-danger shadow-sm">
                <p class="text-xs text-gray-500 font-bold uppercase">Échecs</p>
                <h3 id="statDanger" class="text-2xl font-bold text-gray-900 dark:text-white">0</h3>
            </div>
        </div>

        <!-- Tableau de saisie Gradebook -->
        <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm overflow-hidden">
            <div class="table-container">
                <table class="w-full text-left border-collapse">
    <thead>
    <tr id="dynamicHeaders"
        class="bg-gray-50 dark:bg-gray-700/50 border-b dark:border-gray-700">
        <!-- rempli dynamiquement par JS -->
    </tr>
</thead>

                    <tbody id="gradebookBody" class="divide-y dark:divide-gray-700 text-sm">
                        <!-- L'état initial est vide, rempli par loadGradebook() via AJAX -->
                        <tr>
                            <td colspan="20" class="px-6 py-12 text-center text-gray-400">
                                <div class="flex flex-col items-center gap-3">
                                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary-500"></div>
                                    <span>En attente de sélection du cours...</span>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Actions de Sauvegarde -->
        <div class="mt-6 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="text-sm text-gray-500 italic">
                <i data-lucide="info" class="w-4 h-4 inline mr-1"></i> Les notes sont validées par rapport au score maximum défini pour chaque évaluation.
            </div>
            <div id="saveStatus" class="hidden mt-2 text-xs text-center font-medium text-primary-600 animate-pulse">
    Envoi des données au serveur...
</div>
            <button id="btnSaveGrades" onclick="saveAllGrades()" class="w-full sm:w-auto px-10 py-3 bg-primary-600 hover:bg-primary-700 text-white font-bold rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">
                <i data-lucide="save" class="w-5 h-5"></i>
                Synchroniser avec la Base de Données
            </button>
        </div>
    </div>
</main>

<!-- Scripts obligatoires -->
<script src="https://unpkg.com/lucide@latest"></script>
<!-- api.js contient ta logique fetchAPI avec les tokens d'auth -->
<script src="/static/dist/js/school_admin/api.js"></script> 
<script src="/static/dist/layout/base.js"></script>
<script src="/static/dist/js/teacher/gradebook.js"></script>

<script>
    // Initialisation des icônes après chargement
    document.addEventListener('DOMContentLoaded', () => {
        lucide.createIcons();
    });
</script>

</body>
</html>
