<!DOCTYPE html>
<html lang="fr" class="">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sybem Academia - Configuration des Frais</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<script>
tailwind.config = {
darkMode: 'class',
theme: {
extend: {
colors: {
primary: {
50:'#f0f9ff',100:'#e0f2fe',200:'#bae6fd',300:'#7dd3fc',
400:'#38bdf8',500:'#0ea5e9',600:'#0284c7',700:'#0369a1',
800:'#075985',900:'#0c4a6e',950:'#082f49',
}
},
boxShadow:{
soft:"0 4px 20px rgba(0,0,0,0.06)",
pro:"0 10px 40px rgba(2,132,199,0.15)"
}
}
}
}
</script>

<style>
[x-cloak]{display:none!important;}
body{transition:background-color .3s,color .3s;}
.fade-scale{animation:fadeScale .25s ease;}
@keyframes fadeScale{
from{opacity:0;transform:scale(.96);}
to{opacity:1;transform:scale(1);}
}
</style>
</head>

<body class="bg-gradient-to-br from-slate-50 to-slate-100 dark:from-slate-950 dark:to-slate-900 min-h-screen">

<div id="sidebar"></div>

<div class="lg:pl-[280px] flex flex-col min-h-screen">

<div id="topbar"></div>

<main class="p-4 md:p-8 space-y-8">

<!-- HEADER SYBEM PRO -->
<div class="flex flex-col md:flex-row md:items-center justify-between gap-6">

<div>
<h1 class="text-3xl font-extrabold tracking-tight text-slate-900 dark:text-white">
Configurations des Frais
</h1>
<p class="text-slate-500 dark:text-slate-400 mt-1">
Gérez les catégories de frais (Minerval, Transport, Cantine…)
</p>
</div>

<button onclick="openTypeModal()"
class="group inline-flex items-center px-5 py-2.5
bg-gradient-to-r from-primary-600 to-primary-500
hover:from-primary-700 hover:to-primary-600
text-white rounded-xl transition-all shadow-pro font-semibold">

<i data-lucide="plus" class="w-4 h-4 mr-2 group-hover:rotate-90 transition-transform"></i>
Proposer un type de frais
</button>

</div>

<div class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl
rounded-2xl border border-slate-200/70 dark:border-slate-800
shadow-soft overflow-hidden">

<div class="overflow-x-auto">

<table class="w-full text-left border-collapse">

<thead class="bg-gradient-to-r from-slate-50 to-slate-100 dark:from-slate-800 dark:to-slate-900 text-sm uppercase tracking-wide">
<tr>
<th class="p-4 font-bold text-slate-600 dark:text-slate-300">Nom du Type</th>
<th class="p-4 font-bold text-slate-600 dark:text-slate-300">Statut</th>
<th class="p-4 font-bold text-slate-600 dark:text-slate-300 text-right">Actions</th>
</tr>
</thead>

<tbody id="feeTypesTableBody"
class="divide-y divide-slate-100 dark:divide-slate-800 text-[15px]">

<tr id="loadingState">
<td colspan="3" class="p-10 text-center">
<div class="flex flex-col items-center gap-3 text-slate-400">
<div class="animate-spin w-6 h-6 border-2 border-primary-500 border-t-transparent rounded-full"></div>
<span class="italic">Chargement des données SYBEM…</span>
</div>
</td>
</tr>

</tbody>
</table>

</div>
</div>

</main>
</div>


<div id="typeModal"
class="fixed inset-0 z-[60] hidden bg-slate-900/70 backdrop-blur-md items-center justify-center p-4">

<div class="fade-scale bg-white dark:bg-slate-900 rounded-2xl shadow-2xl w-full max-w-md
border border-slate-200 dark:border-slate-800 overflow-hidden">

<div class="p-6 border-b dark:border-slate-800 flex justify-between items-center">
<h3 class="text-lg font-extrabold text-slate-900 dark:text-white">
Nouveau Type de Frais
</h3>
<button onclick="closeTypeModal()"
class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition">
<i data-lucide="x" class="w-5 h-5"></i>
</button>
</div>

<div class="p-6 space-y-4">

<input type="text"
id="typeNameInput"
placeholder="Ex: Cantine"
class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700
bg-white dark:bg-slate-800 dark:text-white outline-none
focus:ring-2 focus:ring-primary-500 focus:border-primary-500
transition shadow-sm">

<p class="text-xs text-amber-700 dark:text-amber-300
bg-amber-50 dark:bg-amber-900/20 p-3 rounded-lg">
Une notification sera envoyée au directeur pour approbation.
</p>

</div>

<div class="p-6 border-t dark:border-slate-800 flex justify-end gap-3">

<button onclick="closeTypeModal()"
class="px-4 py-2 text-slate-600 dark:text-slate-400
hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition">
Annuler
</button>

<button id="btnSave"
onclick="saveType()"
class="px-5 py-2.5 bg-gradient-to-r from-primary-600 to-primary-500
hover:from-primary-700 hover:to-primary-600
text-white rounded-xl font-bold shadow-pro transition">

<span id="btnText">Envoyer</span>

</button>


</div>

</div>
</div>

<script src="/static/dist/layout/base.js"></script>
<script src="/static/dist/js/finance/fee_types.js"></script>

<script>
lucide.createIcons();
</script>

</body>
</html>
