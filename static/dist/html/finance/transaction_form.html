<!DOCTYPE html>
<html lang="fr" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sybem Academia - Guichet</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 50:'#f0f9ff', 100:'#e0f2fe', 200:'#bae6fd', 300:'#7dd3fc', 400:'#38bdf8', 500:'#0ea5e9', 600:'#0284c7', 700:'#0369a1', 800:'#075985', 900:'#0c4a6e' }
                    }
                }
            }
        }
    </script>
    <style>
        body { transition: background-color 0.3s; }
        /* Animation pour le switch Recette/Dépense */
        .tab-active { @apply ring-2 ring-offset-2; }
    </style>
</head>

<body class="bg-slate-50 dark:bg-slate-950 min-h-screen font-sans text-slate-900 dark:text-slate-100">

    <div id="sidebar"></div>
    
    <div class="lg:pl-[280px] flex flex-col min-h-screen">
        <div id="topbar"></div>

        <main class="p-4 md:p-6 space-y-6 max-w-4xl mx-auto w-full">
            
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-2xl font-bold">Guichet & Opérations</h1>
                    <p class="text-slate-500 dark:text-slate-400 text-sm">Enregistrez un paiement ou une dépense</p>
                </div>
                <div class="bg-blue-50 dark:bg-blue-900/20 px-4 py-2 rounded-lg border border-blue-100 dark:border-blue-800 flex items-center gap-2">
                    <i data-lucide="refresh-cw" class="w-4 h-4 text-blue-600"></i>
                    <span class="text-sm font-medium text-blue-800 dark:text-blue-300">Taux: <span id="currentRateDisplay">...</span> FC</span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 p-1 bg-slate-200 dark:bg-slate-800 rounded-xl">
                <button onclick="setTransactionType('INCOME')" id="btnIncome" class="flex items-center justify-center gap-2 py-3 rounded-lg font-bold transition-all bg-white dark:bg-slate-700 shadow-sm text-green-600">
                    <i data-lucide="download" class="w-5 h-5"></i>
                    ENCAISSEMENT
                </button>
                <button onclick="setTransactionType('EXPENSE')" id="btnExpense" class="flex items-center justify-center gap-2 py-3 rounded-lg font-medium transition-all text-slate-500 hover:text-slate-700 dark:hover:text-slate-300">
                    <i data-lucide="upload" class="w-5 h-5"></i>
                    DÉPENSE
                </button>
            </div>

            <form id="transactionForm" class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-lg space-y-6 relative overflow-hidden">
                
                <div id="sideIndicator" class="absolute left-0 top-0 bottom-0 w-1.5 bg-green-500 transition-colors duration-300"></div>

                <div id="studentSection" class="space-y-4">
                    <h3 class="text-sm font-bold uppercase tracking-wider text-slate-400 flex items-center gap-2">
                        <i data-lucide="user" class="w-4 h-4"></i> Identification
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-1.5">Classe</label>
                            <select id="classSelect" onchange="loadStudentsAndFees(this.value)" class="w-full px-4 py-2.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 outline-none focus:ring-2 focus:ring-primary-500 transition-all">
                                <option value="">-- Sélectionner --</option>
                                </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1.5">Élève</label>
                            <select id="studentSelect" disabled class="w-full px-4 py-2.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 outline-none focus:ring-2 focus:ring-primary-500 disabled:opacity-50 disabled:cursor-not-allowed transition-all">
                                <option value="">-- D'abord choisir la classe --</option>
                            </select>
                        </div>
                    </div>
                </div>

                <hr class="border-slate-100 dark:border-slate-800">

                <div class="space-y-4">
                    <h3 class="text-sm font-bold uppercase tracking-wider text-slate-400 flex items-center gap-2">
                        <i data-lucide="file-text" class="w-4 h-4"></i> Détails
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-1.5">Motif / Type de Frais</label>
                            <select id="feeStructureSelect" class="w-full px-4 py-2.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 outline-none focus:ring-2 focus:ring-primary-500 transition-all">
                                <option value="">-- Sélectionner un motif --</option>
                                </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1.5">Note / Commentaire</label>
                            <input type="text" id="descriptionInput" placeholder="Ex: Paiement partiel..." class="w-full px-4 py-2.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 outline-none focus:ring-2 focus:ring-primary-500">
                        </div>
                    </div>
                </div>

                <hr class="border-slate-100 dark:border-slate-800">

                <div class="bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl border border-slate-100 dark:border-slate-800 space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="md:col-span-1">
                            <label class="block text-sm font-medium mb-1.5">Montant</label>
                            <input type="number" id="amountInput" step="0.01" min="0" placeholder="0.00" class="w-full px-4 py-2.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 font-mono text-lg font-bold outline-none focus:ring-2 focus:ring-primary-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1.5">Devise</label>
                            <select id="currencySelect" class="w-full px-4 py-2.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 outline-none focus:ring-2 focus:ring-primary-500">
                                <option value="USD">USD ($)</option>
                                <option value="CDF">CDF (Fc)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1.5">Moyen de paiement</label>
                            <select id="methodSelect" class="w-full px-4 py-2.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 outline-none focus:ring-2 focus:ring-primary-500">
                                <option value="CASH">Espèces (Cash)</option>
                                <option value="MOBILE_MONEY">Mobile Money</option>
                                <option value="BANK_TRANSFER">Virement Bancaire</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="flex items-center justify-end gap-4 pt-4">
                    <button type="button" onclick="resetForm()" class="px-6 py-2.5 text-slate-500 hover:text-slate-700 font-medium transition-colors">
                        Effacer
                    </button>
                    <button type="submit" id="submitBtn" class="px-8 py-2.5 bg-green-600 hover:bg-green-700 text-white font-bold rounded-xl shadow-lg shadow-green-200 dark:shadow-none transform active:scale-95 transition-all flex items-center gap-2">
                        <i data-lucide="check" class="w-5 h-5"></i>
                        <span id="submitBtnText">Encaisser</span>
                    </button>
                </div>
            </form>

        </main>
    </div>

    <script src="/static/dist/layout/base.js"></script>
    <script src="/static/dist/js/finance/transaction_form.js"></script>
</body>
</html>
