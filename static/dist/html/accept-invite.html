<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activation du compte | SyBem</title>
  <link rel="stylesheet" href="/static/dist/css/output.css">
</head>

<body class="min-h-screen bg-slate-50 flex items-center justify-center px-4">

  <div class="w-full max-w-md bg-white rounded-xl shadow p-6">
    <h1 class="text-xl font-semibold text-slate-800 mb-4 text-center">
      Activation de votre compte
    </h1>

    <form id="inviteForm" class="space-y-4">

      <div>
        <label class="block text-sm font-medium">Prénom</label>
        <input type="text" id="first_name" required
          class="w-full mt-1 px-3 py-2 border rounded-lg focus:ring focus:ring-blue-200">
      </div>

      <div>
        <label class="block text-sm font-medium">Nom</label>
        <input type="text" id="last_name" required
          class="w-full mt-1 px-3 py-2 border rounded-lg focus:ring focus:ring-blue-200">
      </div>

      <div>
        <label class="block text-sm font-medium">Mot de passe</label>
        <input type="password" id="password" required
          class="w-full mt-1 px-3 py-2 border rounded-lg focus:ring focus:ring-blue-200">
      </div>

      <div>
        <label class="block text-sm font-medium">Confirmer le mot de passe</label>
        <input type="password" id="confirm_password" required
          class="w-full mt-1 px-3 py-2 border rounded-lg focus:ring focus:ring-blue-200">
      </div>

      <p id="errorBox" class="text-sm text-red-600 hidden"></p>
      <p id="successBox" class="text-sm text-green-600 hidden"></p>

      <button type="submit"
        class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
        Activer mon compte
      </button>
    </form>
  </div>

  <script src="/static/dist/js/invitations.js"></script>
</body>
</html>
