<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Changer mot de passe – SYBEM</title>
  <link rel="stylesheet" href="/static/dist/css/output.css">
</head>

<body class="h-screen flex items-center justify-center bg-gray-100">

  <form class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md"
        onsubmit="changePassword(event)">

    <h2 class="text-2xl font-bold mb-4">Mot de passe requis</h2>

    <p class="text-sm text-gray-600 mb-6">
      Vous devez définir un nouveau mot de passe avant de continuer.
    </p>

    <input id="new-password" type="password" required
           placeholder="Nouveau mot de passe"
           class="w-full mb-4 px-4 py-2 border rounded">

    <input id="confirm-password" type="password" required
           placeholder="Confirmer le mot de passe"
           class="w-full mb-4 px-4 py-2 border rounded">

    <button class="w-full bg-primary text-white py-2 rounded">
      Valider
    </button>

  </form>

  <script src="/static/dist/js/force-password.js"></script>
</body>
</html>
