<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Créer un élève</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 dark:bg-slate-950">

<div id="sidebar"></div>

<div class="ml-0 lg:ml-[280px] min-h-screen flex flex-col">
  <div id="topbar"></div>

  <main class="p-6 max-w-5xl mx-auto w-full">

    <div class="mb-6">
      <h1 class="text-2xl font-bold text-slate-800 dark:text-white">
        Nouvel élève
      </h1>
      <p class="text-slate-500 text-sm">
        Renseignez les informations de l’élève
      </p>
    </div>

    <form id="studentForm"
          enctype="multipart/form-data"
          class="bg-white dark:bg-slate-900 rounded-2xl shadow p-6 space-y-6">

      <div class="flex items-center gap-6">
  <img id="photoPreview"
       src="https://ui-avatars.com/api/?name=E&background=6366f1&color=fff"
       class="h-24 w-24 rounded-full object-cover border-2 border-indigo-500">

  <label class="cursor-pointer">
    <input type="file"
           id="profile_picture"
           accept="image/*"
           hidden
           onchange="previewPhoto(event)">
    <span class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm hover:bg-indigo-700">
      Photo de profil
    </span>
  </label>
</div>


      <!-- INFOS -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <input id="last_name" placeholder="Nom *" class="input" required>
        <input id="middle_name" placeholder="Post-nom" class="input">
        <input id="first_name" placeholder="Prénom *" class="input" required>

        <input type="date" id="date_of_birth" class="input">

        <select id="gender" class="input">
  <option value="">Genre</option>
  <option value="male">Masculin</option>
  <option value="female">Féminin</option>
  <option value="other">Autre</option>
</select>


        <input id="phone_number" placeholder="Téléphone" class="input">
        <input id="email" type="email" placeholder="Email" class="input">
        <input id="student_id_code" placeholder="Matricule" class="input">

        <select id="status" class="input">
          <option value="active">Actif</option>
          <option value="inactive">Inactif</option>
          <option value="dropout">Abandon</option>
        </select>

      </div>

      <!-- ACTIONS -->
      <div class="flex justify-end gap-3 pt-4 border-t dark:border-slate-700">
        <button type="button"
                onclick="history.back()"
                class="px-4 py-2 rounded-lg border dark:border-slate-700">
          Annuler
        </button>

        <button type="submit"
                class="px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">
          Enregistrer
        </button>
      </div>

    </form>

  </main>
</div>

<script src="/static/dist/js/pupils/students.js"></script>
<script src="/static/dist/layout/base.js"></script>

<style>
.input {
  @apply w-full px-3 py-2 rounded-lg border
  dark:bg-slate-800 dark:border-slate-700
  dark:text-white focus:ring-2 focus:ring-indigo-500;
}
</style>

</body>
</html>
