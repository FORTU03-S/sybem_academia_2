<aside
  class="fixed inset-y-0 left-0 w-[280px]
         bg-white dark:bg-slate-900
         border-r border-slate-200 dark:border-slate-700
         flex flex-col font-[Inter]">

  <!-- LOGO -->
  <div class="h-20 flex items-center gap-4 px-6 border-b dark:border-slate-700">
    <img
      src="/static/src/img/Transpa-Logo.PNG"
      alt="SYBEM"
      class="h-12 w-12 object-contain"
    />
    <div>
      <p class="text-xl font-bold text-slate-800 dark:text-white">
        SYBEM
      </p>
      <p class="text-xs text-slate-500 dark:text-slate-400">
        Super Admin
      </p>
    </div>
  </div>

  <!-- PROFIL -->
  <div class="px-6 py-5 border-b dark:border-slate-700 flex items-center gap-4">
    <label class="relative cursor-pointer">
      <img
        id="profilePreview"
        src="https://ui-avatars.com/api/?name=Admin&background=6366f1&color=fff"
        class="h-12 w-12 rounded-full border-2 border-indigo-500 object-cover"
      />
      <input
        type="file"
        accept="image/*"
        class="hidden"
        onchange="previewProfile(event)"
      />
      <span
        class="absolute -bottom-1 -right-1 bg-indigo-600 text-white p-1 rounded-full">
        <i data-lucide="camera" class="w-3 h-3"></i>
      </span>
    </label>

    <div>
      <p class="font-semibold text-slate-800 dark:text-white">
        Fortune
      </p>
      <p class="text-xs text-slate-500 dark:text-slate-400">
        fortune@admin.com
      </p>
    </div>
  </div>

  <!-- NAV -->
  <nav class="flex-1 py-4 text-sm space-y-1">

    <a href="/static/dist/html/superadmin/dashboard.html"
       class="flex items-center gap-3 px-6 py-3
              text-slate-600 dark:text-slate-300
              hover:bg-indigo-50 dark:hover:bg-slate-800
              hover:text-indigo-600 dark:hover:text-indigo-400
              transition rounded-r-full">
      <i data-lucide="layout-dashboard"></i>
      Tableau de bord
    </a>

    <a href="/static/dist/html/superadmin/schools.html"
       class="flex items-center gap-3 px-6 py-3
              text-slate-600 dark:text-slate-300
              hover:bg-indigo-50 dark:hover:bg-slate-800
              hover:text-indigo-600 dark:hover:text-indigo-400
              transition rounded-r-full">
      <i data-lucide="school"></i>
      Écoles
    </a>

    <a href="/static/dist/html/superadmin/users.html"
       class="flex items-center gap-3 px-6 py-3
              text-slate-600 dark:text-slate-300
              hover:bg-indigo-50 dark:hover:bg-slate-800
              hover:text-indigo-600 dark:hover:text-indigo-400
              transition rounded-r-full">
      <i data-lucide="users"></i>
      Utilisateurs
    </a>

    <a href="/static/dist/html/superadmin/subscriptions.html"
       class="flex items-center gap-3 px-6 py-3
              text-slate-600 dark:text-slate-300
              hover:bg-indigo-50 dark:hover:bg-slate-800
              hover:text-indigo-600 dark:hover:text-indigo-400
              transition rounded-r-full">
      <i data-lucide="credit-card"></i>
      Abonnements
    </a>
  </nav>

</aside>

<script>
  lucide.createIcons();

  function previewProfile(event) {
    const file = event.target.files[0];
    if (!file) return;
    document.getElementById("profilePreview").src = URL.createObjectURL(file);
  }
</script>
