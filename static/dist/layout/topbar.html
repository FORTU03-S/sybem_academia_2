<div class="fixed top-0 left-0 lg:left-[280px] right-0 h-16 
            bg-white dark:bg-slate-900 
            border-b border-slate-200 dark:border-slate-700 
            z-40 transition-all duration-300">

  <header class="flex items-center justify-between h-full px-6">
    
    <div class="flex items-center gap-4">
      <button onclick="toggleSidebar()" class="lg:hidden p-2 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg">
        <i data-lucide="menu" class="w-6 h-6"></i>
      </button>
      
      <h1 class="font-semibold text-slate-800 dark:text-white text-lg">
        SYBEM
      </h1>

      <div class="hidden sm:flex items-center gap-2 px-3 py-1 bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400 rounded-full text-xs font-medium">
        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
        En ligne
      </div>
    </div>

    <div class="flex items-center gap-2 sm:gap-4">
      <button onclick="toggleDarkMode()" class="p-2 rounded-lg text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
        <i data-lucide="sun-moon" class="w-5 h-5"></i>
      </button>

      <button class="relative p-2 rounded-lg text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
        <i data-lucide="bell" class="w-5 h-5"></i>
        <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-white dark:border-slate-900"></span>
      </button>

      <button onclick="logout()" class="flex items-center gap-2 px-3 py-2 bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 hover:bg-red-100 dark:hover:bg-red-900/40 rounded-lg transition-colors font-medium text-sm">
        <i data-lucide="log-out" class="w-4 h-4"></i>
        <span class="hidden md:inline">Déconnexion</span>
      </button>
    </div>

  </header>
</div>
